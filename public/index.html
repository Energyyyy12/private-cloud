<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0c15 0%, #1a1f2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Размытый орел на фоне */
        body::before {
            content: "🦅";
            position: absolute;
            font-size: 300px;
            opacity: 0.08;
            bottom: 0;
            right: 0;
            pointer-events: none;
        }
        
        .login-card {
            background: rgba(18, 22, 40, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo p {
            color: rgba(255,255,255,0.5);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        
        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        
        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(59,130,246,0.3);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        
        .lang-btn:hover:not(.active) {
            background: rgba(59,130,246,0.3);
        }
        
        input {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4);
        }
        
        .error-message {
            background: rgba(239,68,68,0.2);
            border: 1px solid #ef4444;
            border-radius: 0.75rem;
            padding: 0.75rem;
            text-align: center;
            color: #f87171;
            margin-top: 1rem;
            display: none;
        }
        
        .security-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1 id="appTitle">Private Cloud</h1>
            <p id="appSubtitle">Secure file storage</p>
        </div>
        
        <div class="lang-switch">
            <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">🇷🇺 Рус</button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇬🇧 En</button>
            <button class="lang-btn" data-lang="de" onclick="setLanguage('de')">🇩🇪 De</button>
        </div>
        
        <form id="loginForm">
            <input type="password" id="password" placeholder="Password">
            <button type="submit">Access Cloud</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
        
        <div class="security-note">🔒 End-to-end encrypted</div>
    </div>
    
    <script>
        // Переводы
        const texts = {
            ru: { title: "Private Cloud", subtitle: "Безопасное хранилище", placeholder: "Пароль", button: "Войти", error: "Неверный пароль", note: "🔒 Сквозное шифрование" },
            en: { title: "Private Cloud", subtitle: "Secure file storage", placeholder: "Password", button: "Access Cloud", error: "Wrong password", note: "🔒 End-to-end encrypted" },
            de: { title: "Private Cloud", subtitle: "Sicherer Dateispeicher", placeholder: "Passwort", button: "Zugang", error: "Falsches Passwort", note: "🔒 Ende-zu-Ende verschlüsselt" }
        };
        
        let currentLang = localStorage.getItem('loginLang') || 'en';
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('loginLang', lang);
            
            document.getElementById('appTitle').textContent = texts[lang].title;
            document.getElementById('appSubtitle').textContent = texts[lang].subtitle;
            document.getElementById('password').placeholder = texts[lang].placeholder;
            document.querySelector('button[type="submit"]').textContent = texts[lang].button;
            document.querySelector('.security-note').textContent = texts[lang].note;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // Инициализация языка
        setLanguage(currentLang);
        
        // Логин
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = texts[currentLang].error;
                    errorDiv.style.display = 'block';
                    setTimeout(() => errorDiv.style.display = 'none', 3000);
                }
            } catch (error) {
                errorDiv.textContent = texts[currentLang].error;
                errorDiv.style.display = 'block';
            }
        });
        
        // Проверка сессии
        fetch('/api/check-session').then(res => res.json()).then(data => {
            if (data.authenticated) window.location.href = '/dashboard';
        });
    </script>
</body>
</html>
